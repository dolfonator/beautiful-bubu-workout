# =================================================================
# Netlify configuration — static site, no build step required.
# Drag-and-drop this folder into Netlify, or connect a Git repo.
# =================================================================

[build]
  # Static site: nothing to compile. Publish this folder as-is.
  publish = "."
  command = ""

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"

# Long-cache static assets (filenames are stable)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Pretty 404 -> home (single-page site)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
